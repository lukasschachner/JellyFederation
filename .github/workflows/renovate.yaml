name: "Renovate (Self-hosted CLI)"

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "renovate.json"
      - ".github/workflows/renovate.yaml"

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Run Renovate CLI
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          set -euo pipefail

          if [ -z "${RENOVATE_TOKEN:-}" ]; then
            echo "Missing RENOVATE_TOKEN secret. Do not use GITHUB_TOKEN for Renovate runs." >&2
            exit 1
          fi

          docker run --rm \
            -e RENOVATE_TOKEN \
            -e GITHUB_COM_TOKEN="$RENOVATE_TOKEN" \
            -e RENOVATE_PLATFORM="github" \
            -e RENOVATE_ENDPOINT="$GITHUB_API_URL" \
            -e RENOVATE_REPOSITORIES="$GITHUB_REPOSITORY" \
            -e RENOVATE_ONBOARDING="false" \
            -e LOG_LEVEL="info" \
            renovate/renovate:latest
