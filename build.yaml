changelog: |-
  - Wait for WebRTC DataChannel EOF frames to drain before cleanup.
  - Complete receive queues on DataChannel close so partial transfers do not hang.
  - Fix WebRTC answerer receive startup when incoming DataChannels are already open.
  - Raise SignalR receive limits so relay fallback chunks fit the JSON protocol envelope.
  - Harden WebRTC signaling, DataChannel framing, backpressure, and relay fallback.
  - Add optional TURN server configuration for restrictive NAT/firewall environments.
  - Add plugin-side WebRTC component coverage and streaming range design notes.
