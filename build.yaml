changelog: |-
  - Add bounded pagination for file request, invitation, and server list endpoints.
  - Add EF Core indexes and unique (ServerId, JellyfinItemId) constraint for scalable library queries.
  - Refactor library sync to use set-based stale cleanup with cancellation support.
  - Add API key hashing helpers, security/CORS/session/rate-limit options with startup validation.
  - Extract InvitationService from controller for cleaner workflow boundaries.
  - Lower default request body limit and gate production database auto-migration.
  - Add supply-chain CI: NuGet/npm vulnerability audits, Docker base image digest pinning, SBOM, and Trivy scanning.
  - Resolve npm postcss advisory and update repository hygiene rules.
